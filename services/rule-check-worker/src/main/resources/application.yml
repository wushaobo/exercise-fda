server:
  port: 8081

spring:
  application:
    name: rule-check-worker
  threads:
    virtual:
      enabled: true

otel:
  service:
    name: rule-check-worker
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
  metrics:
    exporter: otlp
  logs:
    exporter: none
  traces:
    exporter: none

fds:
  sqs:
    ticket-queue-url: http://localhost:4566/000000000000/fds-ticket-queue
  rules:
    amount-threshold: 10000.0
  redis:
    result-channel: fds:results
    result-ttl-seconds: 300

