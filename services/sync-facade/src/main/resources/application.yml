server:
  port: 8080

spring:
  application:
    name: sync-facade
  threads:
    virtual:
      enabled: true

fds:
  grpc:
    port: 9090
  sqs:
    ticket-queue-url: http://localhost:4566/000000000000/fds-ticket-queue
  redis:
    result-channel: fds:results
  request:
    timeout-millis: 500
  concurrency:
    max-in-flight: 1000
    acquire-timeout-millis: 50
