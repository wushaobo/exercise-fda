server:
  port: 8080

spring:
  application:
    name: sync-facade
  threads:
    virtual:
      enabled: true

otel:
  service:
    name: sync-facade
  exporter:
    otlp:
      endpoint: http://localhost:4317
      protocol: grpc
  metrics:
    exporter: otlp
  logs:
    exporter: none
  traces:
    exporter: none

fds:
  grpc:
    port: 9090
  sqs:
    ticket-queue-url: http://localhost:4566/000000000000/fds-ticket-queue
  redis:
    result-channel: fds:results
  request:
    timeout-millis: 500
  concurrency:
    max-in-flight: 1000
    acquire-timeout-millis: 50
