spring:
  cloud:
    aws:
      credentials:
        access-key: test
        secret-key: test
      region:
        static: us-east-1
      sqs:
        endpoint: http://localhost:4566

fds:
  grpc:
    enabled: false
  redis:
    enabled: false
    result-channel: fds:results
  sqs:
    ticket-queue-url: http://localhost:4566/000000000000/fds-ticket-queue
  request:
    timeout-millis: 100
  concurrency:
    max-in-flight: 1000
    acquire-timeout-millis: 50
