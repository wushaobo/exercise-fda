{{- if .Values.otel.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    {{- include "fds.labels" . | nindent 4 }}
data:
  {{- if eq .Values.otel.exporter "awsemf" }}
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
      k8s_cluster:
        collection_interval: 30s
        auth_type: serviceAccount
    processors:
      batch:
        timeout: 10s
    exporters:
      awsemf:
        region: {{ .Values.aws.region }}
        log_group_name: {{ .Values.otel.logGroup | quote }}
        namespace: FDS
        dimension_rollup_option: NoDimensionRollup
        resource_to_telemetry_conversion:
          enabled: true
        metric_declarations:
          - dimensions: [[service.name]]
            metric_name_selectors: [".*"]
          - dimensions: [[k8s.deployment.name, k8s.namespace.name]]
            metric_name_selectors: ["k8s\\.deployment\\..*"]
          - dimensions: [[k8s.hpa.name, k8s.namespace.name]]
            metric_name_selectors: ["k8s\\.hpa\\..*"]
    service:
      pipelines:
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [batch]
          exporters: [awsemf]
  {{- else }}
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
      k8s_cluster:
        collection_interval: 30s
        auth_type: serviceAccount
    processors:
      batch:
        timeout: 10s
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        metrics:
          receivers: [otlp, k8s_cluster]
          processors: [batch]
          exporters: [debug]
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  labels:
    {{- include "fds.labels" . | nindent 4 }}
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      tolerations:
        - key: pool
          operator: Equal
          value: monitor
          effect: NoSchedule
      containers:
        - name: otel-collector
          {{- if eq .Values.otel.exporter "awsemf" }}
          image: otel/opentelemetry-collector-contrib:0.155.0
          {{- else }}
          image: otel/opentelemetry-collector:0.155.0
          {{- end }}
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
              name: otlp-grpc
          volumeMounts:
            - name: config
              mountPath: /etc/otel
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
    {{- include "fds.labels" . | nindent 4 }}
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
{{- end }}
