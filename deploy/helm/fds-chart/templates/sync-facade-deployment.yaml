apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-facade
  labels:
    {{- include "fds.labels" . | nindent 4 }}
    app: sync-facade
spec:
  {{- if not .Values.syncFacade.hpa.enabled }}
  replicas: {{ .Values.syncFacade.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: sync-facade
  template:
    metadata:
      labels:
        app: sync-facade
    spec:
      containers:
        - name: sync-facade
          image: {{ include "fds.syncFacade.image" . }}
          imagePullPolicy: {{ .Values.syncFacade.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.syncFacade.http.port }}
              name: http
            - containerPort: {{ .Values.syncFacade.grpc.port }}
              name: grpc
          env:
            - name: SERVER_PORT
              value: {{ .Values.syncFacade.http.port | quote }}
            - name: FDS_GRPC_PORT
              value: {{ .Values.syncFacade.grpc.port | quote }}
            - name: FDS_SQS_TICKET_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: ticket-queue-url
            - name: FDS_REDIS_ENABLED
              value: {{ .Values.redis.enabled | quote }}
            - name: FDS_REDIS_RESULT_CHANNEL
              value: {{ .Values.redis.resultChannel | quote }}
            - name: FDS_REQUEST_TIMEOUT_MILLIS
              value: {{ .Values.syncFacade.requestTimeoutMillis | quote }}
            - name: FDS_CONCURRENCY_MAX_IN_FLIGHT
              value: {{ .Values.syncFacade.concurrencyMaxInFlight | quote }}
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: redis-host
            - name: SPRING_DATA_REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fds-secret
                  key: redis-password
            - name: SPRING_CLOUD_AWS_REGION_STATIC
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: aws-region
            - name: SPRING_CLOUD_AWS_CREDENTIALS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: fds-secret
                  key: aws-access-key-id
            - name: SPRING_CLOUD_AWS_CREDENTIALS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fds-secret
                  key: aws-secret-access-key
            - name: SPRING_CLOUD_AWS_SQS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: sqs-endpoint
            {{- if .Values.otel.enabled }}
            - name: OTEL_SERVICE_NAME
              value: sync-facade
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.collectorEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_METRICS_EXPORTER
              value: otlp
            {{- end }}
          resources:
            {{- toYaml .Values.syncFacade.resources | nindent 12 }}
          livenessProbe:
            grpc:
              port: {{ .Values.syncFacade.grpc.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - nc -z localhost {{ .Values.syncFacade.grpc.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
