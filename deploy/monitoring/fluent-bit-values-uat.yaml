# Fluent Bit → CloudWatch for FDS UAT (EKS).
# helm repo add fluent https://fluent.github.io/helm-charts
# helm upgrade --install fluent-bit fluent/fluent-bit -n fds -f this-file.yaml

config:
  service: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Parsers_File  parsers.conf

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            docker
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Merge_Log           On

  outputs: |
    [OUTPUT]
        Name                  cloudwatch_logs
        Match                 *
        region                ap-southeast-1
        log_group_name        /aws/fluent-bit/fds-uat
        log_stream_prefix     fds-

# IRSA — Fluent Bit pods assume this role to write logs to CloudWatch.
serviceAccount:
  create: true
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::498307943823:role/fds-fluent-bit-uat

# DaemonSet runs on ALL nodes — tolerate both fds and monitor taints.
tolerations:
  - key: pool
    operator: Equal
    value: fds
    effect: NoSchedule
  - key: pool
    operator: Equal
    value: monitor
    effect: NoSchedule

resources:
  requests:
    cpu: 50m
    memory: 64Mi
