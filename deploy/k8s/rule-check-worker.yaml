apiVersion: apps/v1
kind: Deployment
metadata:
  name: rule-check-worker
  labels:
    app: rule-check-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rule-check-worker
  template:
    metadata:
      labels:
        app: rule-check-worker
    spec:
      containers:
        - name: rule-check-worker
          image: fds/rule-check-worker:latest
          ports:
            - containerPort: 8081
              name: http
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: FDS_SQS_TICKET_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: ticket-queue-url
            - name: FDS_REDIS_ENABLED
              value: "true"
            - name: FDS_REDIS_RESULT_CHANNEL
              value: "fds:results"
            - name: FDS_REDIS_RESULT_TTL_SECONDS
              value: "300"
            - name: FDS_REDIS_DENYLIST_KEY
              value: "fds:denylist"
            - name: FDS_DENYLIST_REFRESH_INTERVAL_SECONDS
              value: "60"
            - name: FDS_RULES_AMOUNT_THRESHOLD
              value: "10000.0"
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: redis-host
            - name: SPRING_CLOUD_AWS_REGION_STATIC
              value: "ap-southeast-1"
            - name: SPRING_CLOUD_AWS_SQS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: sqs-endpoint
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rule-check-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rule-check-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fds-config
data:
  ticket-queue-url: "https://sqs.ap-southeast-1.amazonaws.com/123456789012/fds-ticket-queue"
  redis-host: "fds-redis.example.com"
  sqs-endpoint: "https://sqs.ap-southeast-1.amazonaws.com"
