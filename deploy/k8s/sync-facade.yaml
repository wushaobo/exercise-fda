apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-facade
  labels:
    app: sync-facade
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sync-facade
  template:
    metadata:
      labels:
        app: sync-facade
    spec:
      containers:
        - name: sync-facade
          image: fds/sync-facade:latest
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9090
              name: grpc
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: FDS_GRPC_PORT
              value: "9090"
            - name: FDS_SQS_TICKET_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: ticket-queue-url
            - name: FDS_REDIS_ENABLED
              value: "true"
            - name: FDS_REDIS_RESULT_CHANNEL
              value: "fds:results"
            - name: FDS_REQUEST_TIMEOUT_MILLIS
              value: "500"
            - name: FDS_CONCURRENCY_MAX_IN_FLIGHT
              value: "1000"
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: redis-host
            - name: SPRING_CLOUD_AWS_REGION_STATIC
              value: "ap-southeast-1"
            - name: SPRING_CLOUD_AWS_SQS_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: fds-config
                  key: sqs-endpoint
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sync-facade
  labels:
    app: sync-facade
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: grpc
  selector:
    app: sync-facade
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sync-facade
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sync-facade
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
