name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  test:
    name: Test / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [sync-facade, rule-check-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21.0.11'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: ./gradlew test jacocoTestReport

      - name: Coverage summary
        working-directory: services/${{ matrix.service }}
        run: |
          HTML="build/reports/jacoco/test/html/index.html"
          if [ -f "$HTML" ]; then
            SUMMARY=$(grep -o '<tfoot>.*</tfoot>' "$HTML" \
              | sed 's|</td>| |g' \
              | sed 's/<[^>]*>//g' \
              | tr -d ',' \
              | awk '{ printf "Lines: %d/%.0f, Instructions: %s, Branches: %s", $13-$12, $13, $5, $9 }')
            echo "$SUMMARY"
            echo "### ${{ matrix.service }} Coverage" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21.0.11'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Run e2e tests
        run: ./scripts/e2e-test.sh

  deploy:
    name: Deploy to ECR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, e2e]
    permissions:
      id-token: write   # OIDC: assume GitHub Actions IRSA role
      contents: write   # commit-back image tag to values-uat.yaml
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::498307943823:role/fds-github-actions-uat
          aws-region: ap-southeast-1

      - name: Build and push images to ECR
        run: |
          REGISTRY=498307943823.dkr.ecr.ap-southeast-1.amazonaws.com \
          TAG=${{ github.ref_name }}-${{ github.sha }} \
          ./scripts/build-images.sh

      - name: Update image tag in values-uat.yaml
        run: |
          sed -i "s/^    tag: .*/    tag: ${{ github.ref_name }}-${{ github.sha }}/" \
            deploy/helm/fds-chart/values-uat.yaml
          echo "Updated values-uat.yaml:"
          grep 'tag:' deploy/helm/fds-chart/values-uat.yaml

      - name: Commit and push tag update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/helm/fds-chart/values-uat.yaml
          git diff --staged --quiet || \
            git commit -m "ci: bump image tag to ${{ github.ref_name }}-${{ github.sha }} [skip ci]"
          git push
