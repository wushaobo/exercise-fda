name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  test:
    name: Test / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [sync-facade, rule-check-worker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: gradle test jacocoTestReport

      - name: Coverage summary
        working-directory: services/${{ matrix.service }}
        run: |
          HTML="build/reports/jacoco/test/html/index.html"
          if [ -f "$HTML" ]; then
            grep -o '<tfoot>.*</tfoot>' "$HTML" \
              | sed 's|</td>| |g' \
              | sed 's/<[^>]*>//g' \
              | tr -d ',' \
              | awk '{ printf "Lines: %d/%.0f, Instructions: %s, Branches: %s\n", $13-$12, $13, $5, $9 }'
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/jacoco/test/html/

  build-images:
    name: Build Image / ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [sync-facade, rule-check-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        working-directory: services/${{ matrix.service }}
        run: |
          docker build -t fds/${{ matrix.service }}:${{ github.sha }} .

      - name: Verify image
        run: docker images --filter "reference=fds/${{ matrix.service }}" --format "{{.Repository}}:{{.Tag}} {{.Size}}"

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4

      - name: Build JARs
        run: |
          cd services/sync-facade && gradle bootJar -x test -q
          cd ../../services/rule-check-worker && gradle bootJar -x test -q

      - name: Build e2e client
        run: cd e2e-test && gradle build -q

      - name: Start services
        run: |
          cd docker
          docker compose up -d --build
          sleep 30

      - name: Seed denylist
        run: |
          cd docker
          docker compose exec -T redis redis-cli SET fds:denylist "account-blocked-1"
          sleep 6

      - name: Run e2e tests
        run: cd e2e-test && gradle e2eClient -q

      - name: Service logs on failure
        if: failure()
        run: |
          cd docker
          docker compose logs --tail=50
